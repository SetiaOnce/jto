{% extends 'auth/layouts.html' %}
{% load static %}
{% block mainContent %}
<div class="bg-body border border-1 border-hover-3-success shadow-xs d-flex flex-column flex-center rounded-4 w-md-550px p-10">
    <!--begin::Content-->
    <div class="d-flex flex-center flex-column align-items-stretch h-lg-100 w-md-450px">
        <!--begin::Wrapper-->
        <div class="d-flex flex-center flex-column flex-column-fluid pb-15 pb-lg-20">
            <!--begin::Form-->
            <form class="form w-100" id="kt_sign_in_form">
                <!--begin::Img Logo-->
                <div class="text-center mb-5" id="hLogo-login">
                    <div class="text-center mb-5" id="hLogo-login">
                        <div class="d-flex flex-wrap justify-content-center align-items-center gap-3">
                            <img src="{% static 'dist/img/logo_kemenhub.png' %}" class="img-fluid" style="max-width: 72px;" alt="logo-kemenhub">
                            <img src="{% static 'dist/img/logo_hubdat.png' %}" class="img-fluid" style="max-width: 72px;" alt="logo-hubdat">
                        </div>
                    </div>
                </div>
                <!--end::Img Logo-->
                <!--begin::Submit-->
                <div id="fBody-login">
                    <div class="text-center mb-10">
                        <h4 class="text-gray-900 fw-bolder mb-0">KEMENTERIAN PERHUBUNGAN REPUBLIK INDONESIA <br> DIREKTORAT JENDERAL PERHUBUNGAN DARAT</h4>
                    </div>
                    <!-- <div class="text-center mb-10">
                        <h1 class="text-gray-900 fw-bolder mb-0">Login</h1>
                        <div class="text-gray-500 fw-semibold fs-7">Gunakan akun yang sudah terdaftar pada sistem</div>
                    </div> -->
                    <div class="form-floating fv-row mb-3">
                        <input type="text" class="form-control no-space" name="username" id="username" autocomplete="off" placeholder="Username atau Email">
                        <label for="username">Username atau Email</label>
                    </div>
                    <!--begin::Input group-->
                    <div class="form-floating fv-row mb-2">
                        <input type="password" class="form-control no-space" name="password" id="password" autocomplete="off" placeholder="Masukkan password anda">
                        <label for="password">Masukkan password</label>
                    </div>
                    <!--end::Input group-->
                    <!--begin::Wrapper | flex-stack-->
                    <div class="d-flex justify-content-end mb-5">
                        <div class="form-check form-check-custom form-check-solid form-check-sm form-check-primary">
                            <input class="form-check-input" type="checkbox" name="showPass_checkbox" id="showPass_checkbox">
                            <label class="form-check-label" for="showPass_checkbox">Tampilkan password</label>
                        </div>
                    </div>
                    <!--end::Wrapper-->
                    <div class="row justify-content-center">
                        <button type="button" id="btn-login" class="btn btn-sm btn-primary">
                            <span class="indicator-label">
                                <i class="ki-outline ki-entrance-left fs-4"></i> Login
                            </span>
                            <span class="indicator-progress">
                                Mohon tunggu... <span class="spinner-border spinner-border-sm align-middle ms-2"></span>
                            </span>
                        </button>
                    </div>
                </div>
                <!--end::Submit-->
            </form>
            <!--end::Form-->
        </div>
        <!--end::Wrapper-->
    </div>
    <!--end::Content-->
</div>
{% endblock mainContent %}
{% block script %}
<script src="{% static 'dist/scripts/auth/auth.init.js' %}"></script>
{% endblock %}
