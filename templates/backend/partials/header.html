{% load static %}
<div id="kt_app_header" class="app-header align-items-stretch bg-primary">
    <div class="app-container container-fluid d-flex justify-content-between align-items-center px-5" id="kt_app_header_container">

        <!-- KIRI (Logo / Tombol Kembali) -->
        <div class="d-flex align-items-center">
            {% if request.get_full_path != '/dashboard' %}        
                <div class="app-navbar-item">
                    <a href="{% url 'dashboard' %}" class="btn btn-sm btn-outline btn-outline-danger btn-active-light-danger bg-light px-3">
                        <i class="bi bi-backspace fs-3"></i> Kembali
                    </a>
                </div>
            {% else %}
                <a href="javascript:void(0);" class="menu-title text-light fs-3 fw-bolder">
                    <i class="ki-outline ki-home-3 fs-2 me-2 text-light"></i>JTO-BERANDA
                </a>
            {% endif %}
        </div>

        <!-- KANAN (Menu + Navbar) -->
        <div class="d-flex align-items-center gap-3">
            {% include 'backend/partials/menus.html' %}
            {% include 'backend/partials/navbar.html' %}
        </div>

    </div>
</div>
